---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: metrics-server
  namespace: argocd
spec:
  generators:
    - clusters: {}
  template:
    metadata:
      name: metrics-server
      namespace: argocd
    spec:
      sources:
        - repoURL: https://github.com/jonathanfoster/gitops-bridge-argocd.git
          targetRevision: main
          ref: values
        - chart: metrics-server
          repoURL: https://kubernetes-sigs.github.io/metrics-server/
          targetRevision: 3.12.2
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/clusters/default/addons/metrics-server-values.yaml
              - $values/clusters/{{name}}/addons/metrics-server-values.yaml
      destination:
        name: '{{name}}'
        namespace: kube-system
      project: default
      syncPolicy:
        automated: {}
