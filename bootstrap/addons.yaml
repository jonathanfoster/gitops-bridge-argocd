---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons
  namespace: argocd
spec:
  generators:
    - clusters: {}
  template:
    metadata:
      name: addons
      namespace: argocd
    spec:
      source:
        path: addons/
        repoURL: https://github.com/jonathanfoster/gitops-bridge-argocd.git
        targetRevision: main
      destination:
        name: '{{name}}'
        namespace: argocd
      project: default
      syncPolicy:
        automated: {}
