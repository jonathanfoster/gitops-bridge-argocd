---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: addons
  namespace: argocd
spec:
  destination:
    name: in-cluster
    namespace: argocd
  source:
    path: addons/
    repoURL: https://github.com/jonathanfoster/gitops-bridge-argo.git
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
