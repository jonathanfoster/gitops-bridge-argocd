---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-addons
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jonathanfoster/gitops-bridge-argocd.git
    targetRevision: main
    path: bootstrap/addons
    directory:
      recurse: true
      exclude: exclude/*
  destination:
    namespace: argocd
    name: in-cluster
  syncPolicy:
    automated: {}
